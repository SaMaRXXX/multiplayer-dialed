<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dialed Multiplayer MVP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="panel left-panel">
      <h1>Dialed Multiplayer</h1>
      <p class="muted">Minimal room-based reaction game</p>

      <div id="homeView" class="card">
        <label>Player name</label>
        <input id="nameInput" maxlength="16" placeholder="Enter your name" />

        <div class="row gap">
          <button id="createRoomBtn">Create room</button>
        </div>

        <div class="divider"></div>

        <label>Room code</label>
        <input id="roomCodeInput" maxlength="5" placeholder="ABCDE" />
        <button id="joinRoomBtn">Join room</button>
      </div>

      <div id="roomView" class="card hidden">
        <div class="room-header">
          <div>
            <div class="muted">Room code</div>
            <div id="roomCodeLabel" class="room-code">-----</div>
          </div>
          <div>
            <div class="muted">Phase</div>
            <div id="phaseLabel">Lobby</div>
          </div>
        </div>

        <div class="controls">
          <button id="startRoundBtn">Start round</button>
          <button id="backToLobbyBtn" class="secondary">Back to lobby</button>
        </div>

        <div class="timer-wrap">
          <div class="muted">Time left</div>
          <div id="timerLabel" class="timer">30.0s</div>
        </div>
      </div>

      <div id="statusBox" class="status">Welcome.</div>
    </aside>

    <main class="main-area">
      <section class="game-card">
        <div class="game-topbar">
          <div>
            <h2>Target Rush</h2>
            <p class="muted">Click the target as fast as possible</p>
          </div>
          <div class="self-stats">
            <div>Score: <span id="selfScore">0</span></div>
            <div>Hits: <span id="selfHits">0</span></div>
            <div>Misses: <span id="selfMisses">0</span></div>
          </div>
        </div>

        <div id="gameArea" class="game-area">
          <div id="target" class="target hidden"></div>
          <div id="centerMessage" class="center-message">
            Create or join a room to begin
          </div>
        </div>
      </section>

      <section class="leaderboard-card">
        <div class="leaderboard-header">
          <h3>Live Leaderboard</h3>
        </div>
        <div id="leaderboard"></div>
      </section>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
